        .contact-toggle {

            background: #F2F5FF;
            border: none;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;

        .contact-toggle:hover { background: #e8ecff; }

            font-size: 14px;
            color: #333;
            font-weight: 600;
        }
        .contact-arrow {
            font-size: 12px;
            color: #aaa;
            transition: transform 0.3s;

        .contact-arrow.open { transform: rotate(180deg); }
        .contact-content {
            display: none;

            border-radius: 12px;
            margin-top: 8px;

        .contact-phone-number {

        .contact-call-btn {

            cursor: pointer;
            font-family: 'Gowun Dodum', sans-serif;
            text-decoration: none;
            display: inline-block;

        /* ── 카카오 공유 ── */

            transition: background 0.2s;
        }
        .btn-kakao-share:hover { background: #f5dc00; }
        .btn-kakao-share i { font-size: 18px; }

// ── 문의 아코디언 ──
function toggleContact() {
    const content = document.getElementById('contactContent');
    const arrow   = document.getElementById('contactArrow');
    const isOpen  = content.style.display === 'block';
    content.style.display = isOpen ? 'none' : 'block';
    arrow.classList.toggle('open', !isOpen);
}

// ── 토스트 알림 ──
function showToast(msg) {
    let toast = document.getElementById('toastMsg');
    if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toastMsg';
        toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);color:#fff;padding:10px 24px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:opacity 0.3s;';
        document.body.appendChild(toast);
    }
    toast.textContent = msg;
    toast.style.opacity = '1';
    setTimeout(() => { toast.style.opacity = '0'; }, 2000);
}

// ── 카카오페이 송금 ──
function sendKakaoPay(bankName, accountNumber, accountHolder) {
    const accountInfo = `${bankName} ${accountNumber}`;
    if (navigator.clipboard) {
        navigator.clipboard.writeText(accountInfo).then(() => {
            showToast('계좌정보가 복사되었습니다');
        }).catch(() => {});
    }
    const kakaoPayUrl = 'kakaotalk://kakaopay/home';
    window.open(kakaoPayUrl, '_self');
    setTimeout(() => {
        if (!document.hidden) {
            if (confirm(`${accountInfo}\n${accountHolder}\n\n계좌정보가 복사되었습니다.\n카카오페이를 실행하시겠습니까?`)) {
                window.location.href = 'kakaotalk://';
            }
        }
    }, 500);
}

// ── 카카오 SDK 초기화 & 공유 ──
if (typeof Kakao !== 'undefined' && !Kakao.isInitialized()) {
    Kakao.init('115806c46c36d8fd325a360707de3698');
}
function shareKakao() {
    if (typeof Kakao === 'undefined' || !Kakao.isInitialized()) {
        alert('카카오톡 공유 기능을 불러오는 중입니다. 잠시 후 다시 시도해주세요.');
        return;
    }
    Kakao.Share.sendDefault({
        objectType: 'feed',
        content: {
            imageUrl: 'https://ehrtjrhdcor.github.io/jh-sportsday-invite-v2/images/share_thumbnail.jpg',
            link: {
                mobileWebUrl: 'https://ehrtjrhdcor.github.io/jh-sportsday-invite-v2/',
                webUrl: 'https://ehrtjrhdcor.github.io/jh-sportsday-invite-v2/',
            },
        },
        buttons: [{
            title: '초대장 보기',
            link: {
                mobileWebUrl: 'https://ehrtjrhdcor.github.io/jh-sportsday-invite-v2/',
                webUrl: 'https://ehrtjrhdcor.github.io/jh-sportsday-invite-v2/',
            },
        }],
    });
}
